name: Android CI From Zip

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Unzip Project Files
      run: |
        sudo apt-get install unzip
        unzip project.zip -d extracted_project
        
        PROJECT_DIR=$(find extracted_project -name "app" | head -n 1 | xargs dirname)
        echo "PROJECT_PATH=$PROJECT_DIR" >> $GITHUB_ENV
        echo "प्रोजेक्ट का मुख्य फ़ोल्डर मिला: $PROJECT_DIR"

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate Gradle Wrapper Inside Project
      run: |
        cd ${{ env.PROJECT_PATH }}
        # यहाँ हमने वर्जन बढ़ाकर 8.2 कर दिया है जो ऐप को चाहिए
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew

    - name: Build APK with Gradle
      run: |
        cd ${{ env.PROJECT_PATH }}
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: |
          **/build/outputs/apk/debug/*.apk
          
