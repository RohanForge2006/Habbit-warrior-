name: Android CI From Zip

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Unzip Project Files
      run: |
        sudo apt-get install unzip
        unzip project.zip -d extracted_project
        # छिपे हुए फोल्डर के अंदर से मुख्य फाइलों को बाहर निकालना
        find extracted_project -name "build.gradle" -o -name "build.gradle.kts" | head -n 1 | xargs dirname | xargs -I {} cp -r {}/* . 2>/dev/null || true
        find extracted_project -name "app" | head -n 1 | xargs dirname | xargs -I {} cp -r {}/app . 2>/dev/null || true
        ls -la

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Force Generate Wrapper and Permissions
      run: |
        # पुरानी ग्रैडल फाइलों का झंझट खत्म करके नया रैपर बनाना
        gradle wrapper --gradle-version 8.0
        chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: |
          **/build/outputs/apk/debug/*.apk

          

